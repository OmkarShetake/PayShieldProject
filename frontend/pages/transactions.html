<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayShield — Transactions</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    .filters{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
    .filters .fg{margin:0}
    .filters input,.filters select{width:auto;min-width:140px;padding:7px 10px;font-size:12px}
    .mini-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
    .mini{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center}
    .mini-val{font-size:20px;font-weight:700;letter-spacing:-0.5px}
    .mini-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
    .pag{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
    .pag-info{font-size:11px;color:var(--text3);font-family:var(--mono)}
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div><div class="topbar-title">Transactions</div><div class="topbar-sub">PayShield / Payments</div></div>
      <div class="topbar-right">
        <div class="live-badge"><div class="live-dot"></div>Live</div>
        <button class="btn ghost sm" onclick="load()">↻ Refresh</button>
      </div>
    </div>
    <div class="content">
      <div class="mini-stats">
        <div class="mini"><div class="mini-val" id="s-all">—</div><div class="mini-lbl">Total</div></div>
        <div class="mini"><div class="mini-val" style="color:var(--green)" id="s-ok">—</div><div class="mini-lbl">Completed</div></div>
        <div class="mini"><div class="mini-val" style="color:var(--red)" id="s-fail">—</div><div class="mini-lbl">Failed</div></div>
        <div class="mini"><div class="mini-val" style="color:var(--amber)" id="s-pend">—</div><div class="mini-lbl">Pending</div></div>
        <div class="mini"><div class="mini-val" style="color:var(--red)" id="s-flag">—</div><div class="mini-lbl">Flagged</div></div>
      </div>

      <div class="filters">
        <div class="fg"><label>Search</label><input type="text" id="f-q" placeholder="ID or email…" oninput="filter()"/></div>
        <div class="fg"><label>Status</label>
          <select id="f-s" onchange="filter()">
            <option value="">All Status</option>
            <option value="COMPLETED">Completed</option>
            <option value="FAILED">Failed</option>
            <option value="PENDING">Pending</option>
            <option value="FRAUD_CHECK">Fraud Check</option>
          </select>
        </div>
        <div class="fg"><label>Method</label>
          <select id="f-m" onchange="filter()">
            <option value="">All Methods</option>
            <option value="CARD">Card</option>
            <option value="UPI">UPI</option>
            <option value="NET_BANKING">Net Banking</option>
            <option value="WALLET">Wallet</option>
            <option value="BANK_TRANSFER">Bank Transfer</option>
          </select>
        </div>
        <div class="fg"><label>Fraud</label>
          <select id="f-f" onchange="filter()">
            <option value="">All</option>
            <option value="yes">Flagged Only</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>ID</th><th>Amount</th><th>Method</th><th>Customer</th><th>Score</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pag">
          <span class="pag-info" id="pag-info">—</span>
          <div style="display:flex;gap:8px">
            <button class="btn ghost sm" onclick="pg(-1)">← Prev</button>
            <button class="btn ghost sm" onclick="pg(1)">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/utils.js"></script>
<script>
initPage('transactions');
let all=[], filtered=[], page=0, ps=12;

async function load() {
  const d = await apiFetch('/api/payments?size=50') || {content: mockTransactions(40)};
  all = d.content || d;
  document.getElementById('s-all').textContent  = all.length;
  document.getElementById('s-ok').textContent   = all.filter(t=>t.status==='COMPLETED').length;
  document.getElementById('s-fail').textContent = all.filter(t=>t.status==='FAILED').length;
  document.getElementById('s-pend').textContent = all.filter(t=>t.status==='PENDING'||t.status==='FRAUD_CHECK').length;
  document.getElementById('s-flag').textContent = all.filter(t=>t.fraudFlagged).length;
  filter();
}

function filter() {
  const q=document.getElementById('f-q').value.toLowerCase(), s=document.getElementById('f-s').value, m=document.getElementById('f-m').value, f=document.getElementById('f-f').value;
  filtered = all.filter(t=>(!q||t.id?.toLowerCase().includes(q)||t.customerEmail?.toLowerCase().includes(q))&&(!s||t.status===s)&&(!m||t.paymentMethod===m)&&(!f||t.fraudFlagged));
  page=0; render();
}

function render() {
  const start=page*ps, rows=filtered.slice(start,start+ps);
  document.getElementById('pag-info').textContent = `${start+1}–${Math.min(start+ps,filtered.length)} of ${filtered.length}`;
  if(!rows.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="7"><div class="empty"><div class="empty-icon">🔍</div>No results</div></td></tr>`;return;}
  document.getElementById('tbody').innerHTML = rows.map(t=>`<tr>
    <td><span class="mono" style="font-size:11px;color:var(--text2)">${t.id||'—'}</span></td>
    <td><strong>${fmt(t.amount)}</strong></td>
    <td><span class="pill info">${t.paymentMethod}</span></td>
    <td style="color:var(--text2)">${t.customerEmail||'—'}</td>
    <td><span class="score ${scoreClass(t.fraudScore)}">${parseFloat(t.fraudScore).toFixed(1)}</span></td>
    <td>${statusPill(t.status,t.fraudFlagged)}</td>
    <td style="color:var(--text3);font-size:12px">${fmtDate(t.initiatedAt)}</td>
  </tr>`).join('');
}

function pg(d){const mp=Math.ceil(filtered.length/ps)-1;page=Math.max(0,Math.min(page+d,mp));render();}
load();
</script>
</body>
</html>
