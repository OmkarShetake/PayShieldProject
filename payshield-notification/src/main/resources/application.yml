server:
  port: 8085

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: payshield-notification
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notification_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@payshield.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payshield-notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.payshield.*"

notification:
  from-email: noreply@payshield.com
  from-name: PayShield Platform
  webhook:
    timeout: 5000
    retry-attempts: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.payshield:                   DEBUG
    org.springframework.web:         INFO
    org.springframework.security:    WARN
    org.springframework.kafka:       WARN
    org.hibernate.SQL:               WARN
    org.flywaydb:                    INFO
    com.zaxxer.hikari:               WARN
