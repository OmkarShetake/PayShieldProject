server:
  port: 8083

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: payshield-fraud
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fraud_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payshield-fraud
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.payshield.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

kafka:
  topics:
    fraud-check-request: fraud.check.request
    fraud-check-response: fraud.check.response
    fraud-alert: fraud.alert

fraud:
  rules:
    high-amount-threshold: 100000
    velocity-max-per-hour: 10
    velocity-max-amount-per-hour: 500000
    flag-score-threshold: 75.0

ai:
  scorer:
    url: ${AI_SCORER_URL:http://localhost:9000}
    timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.payshield:                   DEBUG
    org.springframework.web:         INFO
    org.springframework.security:    WARN
    org.springframework.kafka:       WARN
    org.hibernate.SQL:               WARN
    org.flywaydb:                    INFO
    com.zaxxer.hikari:               WARN

springdoc:
  api-docs:
    path: /api/fraud-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  info:
    title: "PayShield Fraud Detection API"
    description: "AI-powered fraud scoring — score transactions, view alerts"
    version: "v1.0"
